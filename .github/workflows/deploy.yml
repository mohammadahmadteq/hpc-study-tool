name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Allow the workflow to push the built site to the gh-pages branch.
permissions:
  contents: write

# Avoid overlapping deploys; let the latest push win.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Add SPA fallback + disable Jekyll
        # BrowserRouter deep links 404 on GitHub Pages; serving index.html as
        # 404.html lets the client router take over. .nojekyll keeps Pages from
        # mangling the Vite asset folder.
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
