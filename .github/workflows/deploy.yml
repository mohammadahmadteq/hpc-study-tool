name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual runs from the Actions tab

# Needed for the official Pages deployment API (no branch push involved).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment may be in flight at a time; queue rather than
# race, since overlapping deployments are what makes GitHub's Pages backend
# reject them with "Deployment failed, try again later."
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Add SPA fallback + disable Jekyll
        # BrowserRouter deep links 404 on GitHub Pages; serving index.html as
        # 404.html lets the client router take over. .nojekyll keeps Pages from
        # mangling the Vite asset folder.
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
